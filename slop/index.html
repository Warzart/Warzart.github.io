---
layout: default
title: Overzicht
---

<h2>Beschikbare pagina's</h2>

<ul>
  {% for p in site.static_files %}
    {% if p.path contains page.dir and p.url != page.url and p.name contains '.html' %}
      <li>
        <a href="{{ p.url | p.relative_url }}">{{ p.title | default: p.name }}</a>
      </li>
    {% endif %}
  {% endfor %}
</ul>
