<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onderwater Bellenfeest</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e90ff, #00008b);
            font-family: 'Arial', sans-serif;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">Score: <span id="score-val">0</span></div>
    <div id="instructions">Tik op de bellen! 🫧</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score-val');
    
    let score = 0;
    let bubbles = [];
    let particles = [];
    const emojis = ['🐙', '🐠', '🐡', '🐢', '🦀', '🐬', '🐳', '🦐', '🐧', '🐳', '⭐', '🧜‍♀️']
    // Audio Context voor het genereren van het pop-geluid
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playPopSound() {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        // Begin met een hoge toon en laat deze snel zakken voor het "pop" effect
        oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Bubble {
        constructor() {
            this.reset();
            this.y = Math.random() * canvas.height;
        }

        reset() {
            this.radius = 50 + Math.random() * 30;
            this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            this.y = canvas.height + this.radius + Math.random() * 200;
            this.speed = 0.6 + Math.random() * 0.8;
            this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
            this.oscillation = Math.random() * Math.PI * 2;
            this.oscSpeed = 0.01 + Math.random() * 0.015;
            this.popped = false;
        }

        update() {
            this.y -= this.speed;
            this.oscillation += this.oscSpeed;
            this.x += Math.sin(this.oscillation) * 0.8;

            if (this.y < -this.radius) {
                this.reset();
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);

            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            let gradient = ctx.createRadialGradient(-this.radius/3, -this.radius/3, this.radius/10, 0, 0, this.radius);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
            gradient.addColorStop(0.5, 'rgba(173, 216, 230, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0.2)');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.font = `${this.radius * 0.9}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, 0, 2);

            ctx.restore();
        }

        pop() {
            if (this.popped) return;
            this.popped = true;
            score++;
            scoreElement.innerText = score;

            // Speel het geluidje af
            playPopSound();

            confetti({
                particleCount: 50,
                spread: 80,
                origin: { 
                    x: this.x / canvas.width, 
                    y: this.y / canvas.height 
                },
                colors: ['#FFD700', '#FF69B4', '#00FF7F', '#ffffff', '#87CEEB']
            });

            createDancer(this.x, this.y, this.emoji);
            setTimeout(() => this.reset(), 100);
        }
    }

    class Dancer {
        constructor(x, y, emoji) {
            this.x = x;
            this.y = y;
            this.emoji = emoji;
            this.life = 1.0;
            this.rotation = 0;
            this.scale = 1.2;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = -4 - Math.random() * 4;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.15;
            this.rotation += 0.15;
            this.life -= 0.015;
            this.scale += 0.005;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.font = `${50 * this.scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        }
    }

    function createDancer(x, y, emoji) {
        particles.push(new Dancer(x, y, emoji));
    }

    for (let i = 0; i < 6; i++) {
        bubbles.push(new Bubble());
    }

    function handleInteraction(ex, ey) {
        // Activeer AudioContext bij de eerste klik (vereiste van browsers)
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        for (let i = bubbles.length - 1; i >= 0; i--) {
            const b = bubbles[i];
            const dist = Math.hypot(ex - b.x, ey - b.y);
            if (dist < b.radius * 1.2) {
                b.pop();
                break; 
            }
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        handleInteraction(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleInteraction(touch.clientX, touch.clientY);
    }, { passive: false });

    function animate() {
        let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGrad.addColorStop(0, '#5eb1ff');
        bgGrad.addColorStop(1, '#005bb7');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        bubbles.forEach(b => {
            b.update();
            b.draw();
        });

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    window.onload = animate;
</script>

</body>
</html>
